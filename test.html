<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Page</title>
  </head>
  <body>
    <h1>MediSense Test</h1>
    <p>Testing login flow...</p>
    <button id="testPatient">Test Patient Login</button>
    <button id="testDoctor">Test Doctor Login</button>
    <button id="checkSession">Check Session</button>
    <div id="output"></div>

    <script>
      const output = document.getElementById("output");

      document.getElementById("testPatient").addEventListener("click", () => {
        const session = { role: "patient", name: "Test Patient", email: "patient@test.com" };
        sessionStorage.setItem("medisense-session", JSON.stringify(session));
        output.textContent = "Patient session set. Redirecting...";
        setTimeout(() => {
          window.location.href = "patient-dashboard.html";
        }, 500);
      });

      document.getElementById("testDoctor").addEventListener("click", () => {
        const session = { role: "doctor", name: "Dr. Test", email: "doctor@test.com" };
        sessionStorage.setItem("medisense-session", JSON.stringify(session));
        output.textContent = "Doctor session set. Redirecting...";
        setTimeout(() => {
          window.location.href = "doctor-dashboard.html";
        }, 500);
      });

      document.getElementById("checkSession").addEventListener("click", () => {
        const session = sessionStorage.getItem("medisense-session");
        output.textContent = "Current session: " + (session || "None");
      });
    </script>
  </body>
</html>
