services:
  - type: web
    name: medisense-api
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGODB_URI
        value: YOUR_MONGODB_ATLAS_CONNECTION_STRING
      - key: MONGODB_DATABASE
        value: medisense
      - key: SECRET_KEY
        value: YOUR_SECRET_KEY_CHANGE_IN_PRODUCTION
      - key: PYTHON_VERSION
        value: 3.13.0

  - type: static
    name: medisense-frontend
    buildCommand: echo "No build step needed for static files"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /api/(.*)
        destination: https://medisense-api.onrender.com/api/$1